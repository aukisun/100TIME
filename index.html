<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TIME100 AI — 100 самых влиятельных людей в искусственном интеллекте</title>
<meta name="description" content="100 самых влиятельных людей в области ИИ по версии TIME Magazine. Лидеры, новаторы, создатели повестки, мыслители." />
<meta property="og:title" content="TIME100 AI — Universe" />
<meta property="og:description" content="100 самых влиятельных людей в ИИ. Интерактивный путеводитель по AI-вселенной." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'DM Sans',sans-serif;
    background:#050507;
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
  }
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{text-decoration:none;color:inherit}

  @keyframes fi{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
  @keyframes f0{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  @keyframes f1{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes f2{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
  @keyframes f3{0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}

  /* Background canvas */
  #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

  /* HERO */
  .hero{
    height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;z-index:1;
  }
  .hero-line{width:32px;height:2px;background:#E3120B;margin-bottom:26px;opacity:0.6}
  .hero h1{font-family:'Space Mono',monospace;font-size:88px;font-weight:700;letter-spacing:-3px;line-height:1}
  .hero-line2{width:90px;height:2px;background:#E3120B;margin:12px 0 26px}
  .hero h2{
    font-family:'Space Mono',monospace;font-size:16px;font-weight:700;
    letter-spacing:7px;text-transform:uppercase;text-align:center;line-height:1.7
  }
  .hero p{
    font-size:10px;color:rgba(255,255,255,0.18);letter-spacing:4px;
    font-family:'Space Mono',monospace;margin-top:18px
  }
  .scroll-hint{
    position:absolute;bottom:32px;display:flex;flex-direction:column;align-items:center;gap:5px;
    opacity:0.3;transition:opacity 0.5s;
  }
  .scroll-hint.hidden{opacity:0}
  .scroll-hint span{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.25)}
  .scroll-hint .line{width:1px;height:24px;background:linear-gradient(to bottom, rgba(227,18,11,0.4), transparent)}

  /* UNIVERSE */
  .universe{min-height:100vh;position:relative;z-index:1;padding:90px 0 60px}
  .universe-header{text-align:center;margin-bottom:65px}
  .universe-header .label{
    font-size:9px;letter-spacing:5px;color:#E3120B;
    font-family:'Space Mono',monospace;margin-bottom:12px;
  }
  .universe-header h2{font-family:'Space Mono',monospace;font-size:28px;font-weight:700}
  .universe-header p{
    font-size:12.5px;color:rgba(255,255,255,0.28);margin-top:10px;
    max-width:420px;margin-left:auto;margin-right:auto;line-height:1.7
  }

  /* PLANETS */
  .planets{
    display:flex;justify-content:center;align-items:center;gap:55px;
    flex-wrap:wrap;padding:0 24px;margin-bottom:60px;
  }
  .planet-wrap{cursor:pointer}
  .planet{
    width:140px;height:172px;position:relative;
    transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .planet-wrap:hover .planet, .planet.active{transform:scale(1.15)}
  .planet-ring1, .planet-ring2{
    position:absolute;border-radius:50%;transition:all 0.5s;
  }
  .planet-ring1{inset:-22px;bottom:10px}
  .planet-ring2{inset:-38px;bottom:-6px}
  .planet-glow{
    position:absolute;inset:-30px;bottom:2px;border-radius:50%;
    transition:opacity 0.5s;filter:blur(15px);
  }
  .planet-body{
    width:140px;height:140px;border-radius:50%;position:relative;overflow:hidden;
    transition:box-shadow 0.5s;
  }
  .planet-spec1{
    position:absolute;top:11%;left:17%;width:34%;height:24%;border-radius:50%;
    background:radial-gradient(ellipse, rgba(255,255,255,0.24), transparent);
    transform:rotate(-25deg);filter:blur(3px);
  }
  .planet-spec2{
    position:absolute;top:17%;left:22%;width:16%;height:10%;border-radius:50%;
    background:radial-gradient(ellipse, rgba(255,255,255,0.12), transparent);
    filter:blur(2px);
  }
  .planet-shadow{
    position:absolute;bottom:0;left:0;right:0;height:50%;
    background:linear-gradient(to bottom, transparent, rgba(0,0,0,0.4));
  }
  .planet-label{
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    font-family:'Space Mono',monospace;font-size:9px;font-weight:700;
    letter-spacing:2px;white-space:nowrap;opacity:0.5;transition:opacity 0.3s;
  }
  .planet-wrap:hover .planet-label, .planet.active + .planet-label, .planet-wrap:hover ~ .planet-label{opacity:1}
  .planet-wrap.active .planet-label{opacity:1}

  /* TOOLTIP */
  .tooltip{
    position:fixed;z-index:50;pointer-events:none;
    transform:translate(-50%, -110%);
    animation:fi 0.2s ease;
  }
  .tooltip-box{
    background:rgba(8,8,14,0.96);border-radius:10px;padding:16px 20px;
    max-width:340px;min-width:260px;backdrop-filter:blur(16px);
  }
  .tooltip-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .tooltip-dot{width:8px;height:8px;border-radius:50%}
  .tooltip-label{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:2px}
  .tooltip-count{margin-left:auto;font-size:10px;color:rgba(255,255,255,0.25);font-family:'Space Mono',monospace}
  .tooltip-desc{font-size:11.5px;line-height:1.65;color:rgba(255,255,255,0.55);margin:0}
  .tooltip-cta{
    margin-top:10px;padding-top:8px;font-size:9px;
    font-family:'Space Mono',monospace;letter-spacing:1.5px;opacity:0.6;
  }
  .tooltip-arrow{
    width:0;height:0;margin:0 auto;
    border-left:7px solid transparent;border-right:7px solid transparent;
  }

  /* CARDS GRID */
  .cards-section{max-width:1280px;margin:0 auto;padding:0 24px;animation:fi 0.4s ease}
  .cat-header{
    display:flex;align-items:center;gap:12px;
    margin-bottom:28px;padding-bottom:18px;
    max-width:800px;margin-left:auto;margin-right:auto;
  }
  .cat-header-dot{width:10px;height:10px;border-radius:50%}
  .cat-header-text{flex:1}
  .cat-header-label{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:2.5px}
  .cat-header-desc{
    font-size:11.5px;color:rgba(255,255,255,0.4);margin-top:4px;line-height:1.5;
    font-family:'DM Sans',sans-serif;
  }
  .cat-header-count{font-size:11px;color:rgba(255,255,255,0.3);font-family:'Space Mono',monospace;flex-shrink:0}

  .cards-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(360px, 1fr));
    gap:16px;align-items:start;
  }
  .card{
    border-radius:12px;background:rgba(10,10,14,0.7);
    border:1px solid rgba(255,255,255,0.08);
    transition:all 0.3s ease;backdrop-filter:blur(10px);overflow:hidden;
  }
  .card.open{box-shadow:0 0 30px var(--glow)}
  .card-header{cursor:pointer;padding:16px 18px;display:flex;align-items:center;gap:14px}
  .avatar{
    width:44px;height:44px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:#fff;
  }
  .card-name-role{flex:1;min-width:0}
  .card-name{
    font-family:'Space Mono',monospace;font-size:14px;font-weight:700;
    line-height:1.25;margin-bottom:2px;
  }
  .card-role{
    font-family:'DM Sans',sans-serif;font-size:11.5px;
    color:rgba(255,255,255,0.5);line-height:1.4;
  }
  .card-chevron{
    width:32px;height:32px;border-radius:50%;flex-shrink:0;
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
    color:rgba(255,255,255,0.5);
    display:flex;align-items:center;justify-content:center;
    transition:transform 0.3s ease;
  }
  .card.open .card-chevron{transform:rotate(180deg)}
  .card-body{padding:0 18px 18px;display:none}
  .card.open .card-body{display:block;animation:fi 0.4s ease}
  .card-body-inner{padding-top:14px}
  .card-bio{
    font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.75;
    color:rgba(255,255,255,0.7);margin:0 0 14px;
  }
  .card-link{
    display:inline-flex;align-items:center;gap:6px;
    font-family:'Space Mono',monospace;font-size:11px;
    letter-spacing:1px;font-weight:700;
    opacity:0.9;transition:opacity 0.2s ease;
  }
  .card-link:hover{opacity:1}
  .card-link-arrow{font-size:14px}

  /* FOOTER */
  footer{
    text-align:center;padding:45px 20px 25px;position:relative;z-index:1;
    border-top:1px solid rgba(255,255,255,0.03);
  }
  footer .src{
    font-family:'Space Mono',monospace;font-size:9px;
    color:rgba(255,255,255,0.12);letter-spacing:2px;
  }

  /* MOBILE */
  @media (max-width: 640px) {
    .hero h1{font-size:64px}
    .hero h2{font-size:13px;letter-spacing:4px}
    .planets{gap:40px}
    .planet{width:110px;height:138px}
    .planet-body{width:110px;height:110px}
    .cards-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<section class="hero">
  <div class="hero-line"></div>
  <h1>TIME</h1>
  <div class="hero-line2"></div>
  <h2>The 100 Most Influential<br/>People in AI</h2>
  <p>LEADERS · INNOVATORS · SHAPERS · THINKERS</p>
  <div class="scroll-hint" id="scroll-hint">
    <span>SCROLL</span>
    <div class="line"></div>
  </div>
</section>

<section class="universe">
  <div class="universe-header">
    <div class="label">AI UNIVERSE</div>
    <h2>Explore the Constellation</h2>
    <p>Четыре мира. Сто ключевых фигур.<br/>Наведи на планету — узнай, кто здесь обитает.</p>
  </div>
  <div class="planets" id="planets"></div>
  <div id="cards-container"></div>
</section>

<footer>
  <div class="src">По материалам TIME Magazine · time.com/time100ai</div>
</footer>

<!-- Three.js for cinematic background -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const TIME_BASE = "https://time.com/collection/time100-ai-2024/";
const slug = (n) => n.toLowerCase().replace(/[^a-zа-я0-9\s]/gi, "").replace(/\s+/g, "-");

const CATS = [
  {
    id:"leaders", label:"ЛИДЕРЫ", color:"#E3120B", cl:"#FF4136", glow:"rgba(227,18,11,0.4)",
    desc:"CEO и архитекторы AI-империй. Главы Google, Microsoft, Meta, NVIDIA, OpenAI — люди, чьи решения определяют темп AI-революции.",
    people:[
      {n:"Sundar Pichai", r:"CEO, Google и Alphabet", b:"Sundar Pichai — генеральный директор Google и Alphabet, родившийся в индийском Мадурае и пришедший в Google в 2004 году. С 2015 года он возглавляет Google, а с 2019-го — материнский Alphabet, управляя четвёртой по капитализации компанией мира. Под его руководством Google запустил семейство моделей Gemini и интегрировал ИИ во все ключевые продукты — от поиска и Gmail до Docs и облачных сервисов, охватив миллиарды пользователей. В интервью TIME Pichai назвал внедрение ИИ «одним из крупнейших улучшений за 20 лет» работы компании. TIME включил его в список как лидера, определяющего, как именно миллиарды людей впервые столкнутся с генеративным ИИ в повседневной жизни."},
      {n:"Sam Altman", r:"CEO, OpenAI", b:"Sam Altman — глава OpenAI, запустивший ChatGPT в ноябре 2022 года и создавший самое быстрорастущее приложение в истории, набравшее 100 миллионов пользователей за два месяца. В ноябре 2023 года пережил одну из самых драматичных корпоративных историй десятилетия: был уволен советом директоров, а затем триумфально вернулся при поддержке 95% сотрудников. TIME признал его CEO года-2023. Под его руководством OpenAI выпустила GPT-4, GPT-4o и привлекла более $13 миллиардов от Microsoft. TIME отмечает, что его видение создания AGI вызывает как восхищение, так и серьёзную обеспокоенность у исследователей безопасности."},
      {n:"Jensen Huang", r:"CEO и основатель, NVIDIA", b:"Jensen Huang основал NVIDIA в 1993 году в придорожном кафе Denny's и за три десятилетия превратил её в абсолютного монополиста AI-инфраструктуры. GPU серии H100 и A100 стали незаменимой основой для обучения всех современных больших языковых моделей — от GPT-4 до Claude и LLaMA. К 2024 году NVIDIA вошла в тройку самых дорогих компаний мира, временами обгоняя Apple и Microsoft по капитализации. Huang стал лицом AI-бума, его выступления на конференциях GTC собирают десятки тысяч зрителей и буквально двигают рынки. TIME повторно включил его в список, подчёркивая непрерывное влияние на индустрию."},
      {n:"Satya Nadella", r:"CEO, Microsoft", b:"Satya Nadella с 2014 года возглавляет Microsoft, кардинально изменив стратегию компании в сторону облачных сервисов и ИИ. Заключил стратегическое партнёрство с OpenAI, вложив более $13 миллиардов и превратив Microsoft в главного корпоративного спонсора AI-революции. Под его руководством Copilot стал частью всех ключевых продуктов — от Windows и Office до GitHub и Azure. Nadella последовательно продвигает видение «ИИ как второго пилота» для каждого работника. Благодаря AI-стратегии Microsoft обновила исторический максимум капитализации, превысив $3 триллиона. TIME отмечает его как одного из главных архитекторов корпоративной AI-эры."},
      {n:"Mark Zuckerberg", r:"CEO, Meta", b:"Mark Zuckerberg совершил неожиданный стратегический поворот, сделав Meta одним из главных сторонников открытого ИИ. В 2024 году выпустил серию моделей LLaMA 3 в открытый доступ, бросив прямой вызов закрытым моделям OpenAI и Google. Инвестирует десятки миллиардов в AI-инфраструктуру — Meta строит гигантские дата-центры и закупает сотни тысяч GPU NVIDIA. Его решение сделать модели открытыми вызвало бурную дискуссию: сторонники хвалят демократизацию ИИ, критики предупреждают о рисках бесконтрольного распространения. TIME отмечает, что Zuckerberg позиционирует себя как «анти-OpenAI» — главный противник закрытого подхода к разработке ИИ."},
      {n:"Dario Amodei", r:"CEO и сооснователь, Anthropic", b:"Dario Amodei — бывший вице-президент по исследованиям OpenAI, покинувший компанию из-за разногласий по вопросам безопасности. В 2021 году вместе с сестрой Даниелой и группой бывших коллег основал Anthropic — компанию, ставящую безопасность ИИ в центр разработки. Anthropic создала Claude — одного из ведущих AI-ассистентов на рынке, конкурирующего с GPT-4 и Gemini. Компания привлекла миллиарды инвестиций от Google и Amazon, достигнув оценки в $18 миллиардов. Amodei развивает концепцию «конституционного ИИ» — обучения моделей следовать набору этических принципов. TIME повторно включил его в список, что подчёркивает устойчивое влияние на дискуссию о безопасном ИИ."},
      {n:"Demis Hassabis", r:"CEO, Google DeepMind", b:"Demis Hassabis — нейробиолог, шахматный вундеркинд и дизайнер видеоигр, основавший DeepMind в 2010 году. Под его руководством DeepMind создала AlphaGo (победившую чемпиона мира по го), AlphaFold (совершившую революцию в предсказании структуры белков) и множество прорывных AI-систем. В 2024 году Hassabis получил Нобелевскую премию по химии за работу над AlphaFold — впервые в истории AI-исследователь удостоен Нобеля. После слияния DeepMind и Google Brain руководит единым подразделением Google DeepMind, определяя AI-стратегию всего Google. TIME отмечает его путь от разработчика игр до нобелевского лауреата как одну из самых впечатляющих историй технологической индустрии."},
      {n:"C.C. Wei", r:"Председатель и CEO, TSMC", b:"C.C. Wei руководит Taiwan Semiconductor Manufacturing Company — единственной в мире компанией, способной массово производить самые передовые чипы (техпроцесс 3 нм и ниже). Без TSMC невозможно существование ни GPU NVIDIA, ни чипов Apple, ни процессоров для AI-серверов — это буквально незаменимое звено всей AI-индустрии. Компания контролирует более 90% мирового рынка передовых полупроводников. Геополитическое положение Тайваня делает TSMC критической точкой уязвимости для глобальной AI-экосистемы. Wei управляет расширением производства, включая строительство заводов в США и Японии. TIME подчёркивает: его решения напрямую влияют на темпы развития ИИ во всём мире."},
      {n:"Masayoshi Son", r:"Председатель и CEO, SoftBank", b:"Masayoshi Son — японский инвестор-визионер, создавший один из крупнейших технологических фондов в истории, SoftBank Vision Fund объёмом $100 миллиардов. После провалов первого фонда (WeWork, инвестиции периода пандемии) Son поставил всё на ИИ, объявив, что SoftBank будет «крупнейшим AI-инвестором в мире». Владеет крупным пакетом акций ARM — компании, чья архитектура процессоров используется в миллиардах устройств. Планирует инвестировать до $100 миллиардов совместно с другими игроками в AI-инфраструктуру. Son известен своими грандиозными прогнозами: он предсказывает появление AI, в 10 000 раз превосходящего человеческий интеллект. TIME отмечает его влияние на финансирование десятков AI-стартапов по всему миру."},
      {n:"Lisa Su", r:"CEO, AMD", b:"Lisa Su с 2014 года возглавляет AMD, вытянув компанию из глубокого кризиса и превратив её в серьёзного конкурента Intel и NVIDIA. Под её руководством AMD выпустила линейку AI-ускорителей Instinct MI300, напрямую конкурирующих с NVIDIA H100. В 2024 году AMD объявила о планах выпускать новые поколения AI-чипов ежегодно, а не раз в два года. Su интегрирует ИИ во все продукты компании — от серверных процессоров EPYC до ноутбучных Ryzen AI. Она одна из немногих женщин, возглавляющих полупроводниковую компанию такого масштаба. TIME посвятил ей развёрнутый профиль на обложке TIME100 AI 2024, подчёркивая её роль в демонополизации AI-чипового рынка."},
      {n:"Liang Rubo", r:"CEO, ByteDance", b:"Liang Rubo возглавляет ByteDance — материнскую компанию TikTok и одну из самых дорогих частных технологических компаний в мире. Под его руководством ByteDance запустила Doubao — чат-бот, ставший самым популярным AI-приложением в Китае, обогнав аналоги от Baidu и Alibaba. Компания планирует строительство AI-хаба в Малайзии стоимостью $2,2 миллиарда. ByteDance активно использует ИИ для алгоритмических рекомендаций TikTok, формируя контент для более миллиарда пользователей. Компания стремительно выходит на глобальный AI-рынок, конкурируя как с китайскими, так и с западными игроками. TIME отмечает геополитическое давление на TikTok в США, добавляющее дополнительный слой сложности к его роли."},
      {n:"Wang Xiaochuan", r:"Основатель, Baichuan Intelligence", b:"Wang Xiaochuan ранее основал Sogou — одну из крупнейших поисковых систем Китая, проданную Tencent за $3,5 миллиарда. В 2023 году создал Baichuan Intelligence — один из ведущих китайских AI-стартапов, разрабатывающий крупные языковые модели. Baichuan привлёк сотни миллионов долларов инвестиций и быстро вошёл в число лидеров китайского AI-рынка. Компания выпускает как открытые, так и коммерческие модели, конкурируя с ByteDance, Alibaba и Baidu. TIME включил Wang как представителя новой волны китайских AI-предпринимателей, строящих бизнес на фундаменте больших языковых моделей. Его опыт в поисковых технологиях даёт уникальное преимущество в понимании работы с информацией и языком."},
      {n:"Faisal Al Bannai", r:"Генсек ATRC, основатель G42, ОАЭ", b:"Faisal Al Bannai — генеральный секретарь Совета по передовым исследованиям и технологиям ОАЭ и основатель G42, ведущей AI-компании региона. В 2023 году выпустил Falcon — серию открытых языковых моделей, конкурирующих с продуктами BigTech и ставших одними из лучших по соотношению размер/качество. Под его руководством ОАЭ инвестировали миллиарды в AI-инфраструктуру, привлекая мировых специалистов и строя дата-центры. Al Bannai превратил Абу-Даби в один из ключевых AI-хабов мира, заключив партнёрства с Microsoft и другими гигантами. ОАЭ при его участии стали первой арабской страной, серьёзно включившейся в глобальную AI-гонку. TIME отмечает его уникальную модель: открытые исследования плюс мощная государственная поддержка."},
      {n:"Zhuang Rongwen", r:"Директор, CAC, Китай", b:"Zhuang Rongwen возглавляет Администрацию киберпространства Китая (CAC) — главный регулятор интернета и ИИ в стране. Под его руководством Китай принял первые в мире правила регулирования генеративного ИИ ещё до выхода ChatGPT. Его подход балансирует между стимулированием инноваций и строгим контролем: AI-компании обязаны проходить проверку безопасности перед запуском моделей. Zhuang контролирует, чтобы все AI-продукты соответствовали «социалистическим ценностям» и не подрывали государственный контроль над информацией. Его решения определяют, какие AI-модели доступны 1,4 миллиарда китайских пользователей. TIME включил его как архитектора уникальной китайской модели AI-регулирования, кардинально отличающейся от западного подхода."},
      {n:"Rohit Prasad", r:"SVP и Head Scientist AGI, Amazon", b:"Rohit Prasad более десяти лет руководил разработкой Alexa — голосового ассистента Amazon, установленного в сотнях миллионов устройств. В 2023 году был назначен руководителем нового подразделения Amazon AGI, получив мандат на создание общего искусственного интеллекта. Под его руководством Amazon инвестирует миллиарды в AI-исследования и развивает собственные модели, включая Titan. Prasad перестраивает всю AI-стратегию Amazon — от облачных сервисов AWS до потребительских продуктов. Одновременно развивает партнёрства Amazon с AI-стартапами, включая многомиллиардную инвестицию в Anthropic. TIME отмечает: его переход от Alexa к AGI отражает масштаб амбиций Amazon в AI-гонке."},
    ]
  },
  {
    id:"innovators", label:"НОВАТОРЫ", color:"#FF6B35", cl:"#FF8C5A", glow:"rgba(255,107,53,0.4)",
    desc:"Инженеры и предприниматели, превращающие научные прорывы в продукты — новые архитектуры нейросетей, чипы, AI-роботы и поисковики будущего.",
    people:[
      {n:"Ilya Sutskever", r:"Сооснователь, Safe Superintelligence", b:"Ilya Sutskever — легендарный исследователь, стоявший у истоков революции глубокого обучения под руководством Джеффри Хинтона в Университете Торонто. Был сооснователем и главным учёным OpenAI, руководил созданием GPT-2, GPT-3 и GPT-4. В ноябре 2023 года инициировал увольнение Сэма Альтмана из OpenAI — один из самых драматичных эпизодов в истории технологической индустрии. После ухода из OpenAI в мае 2024 года основал Safe Superintelligence (SSI) — компанию, посвящённую исключительно безопасному созданию сверхинтеллекта. SSI привлекла $1 миллиард инвестиций ещё до создания какого-либо продукта, что говорит о масштабе его репутации. TIME повторно включил его в список как человека, чьи решения буквально меняют ход AI-истории."},
      {n:"Andrej Karpathy", r:"Основатель, Eureka Labs", b:"Andrej Karpathy — один из самых уважаемых AI-исследователей-практиков: был одним из первых сотрудников OpenAI, затем четыре года руководил всем ИИ-подразделением Tesla, отвечая за Autopilot. Вернулся в OpenAI, но вскоре покинул компанию. В июле 2024 года основал Eureka Labs — образовательную платформу с AI-наставником, где первым продуктом стал университетский курс по ИИ. Его лекции и видеоматериалы на YouTube собирают миллионы просмотров и считаются золотым стандартом AI-образования. Karpathy уникален своей способностью объяснять сложнейшие концепции доступным языком. TIME включил его как пример того, как AI-инсайдеры строят следующее поколение образования."},
      {n:"Arthur Mensch", r:"CEO и сооснователь, Mistral AI", b:"Arthur Mensch — бывший исследователь Google DeepMind, основавший Mistral AI в Париже в 2023 году и за несколько месяцев превративший его в главный европейский AI-стартап. Компания достигла оценки в $6 миллиардов, выпустив серию открытых моделей (Mistral 7B, Mixtral), которые по качеству конкурируют с гораздо большими моделями. Mensch стал символом европейских AI-амбиций и доказательством того, что передовой ИИ можно строить не только в Кремниевой долине. Mistral AI получила инвестиции от Microsoft и Andreessen Horowitz. Его подход сочетает открытость моделей с коммерческими продуктами для бизнеса. TIME поместил его на обложку TIME100 AI 2024 рядом с Jensen Huang и Lisa Su."},
      {n:"Aravind Srinivas", r:"CEO и сооснователь, Perplexity", b:"Aravind Srinivas — бывший исследователь в Google, OpenAI и DeepMind, основавший Perplexity, AI-поисковик, дающий точные ответы с указанием источников вместо списка ссылок. К 2024 году Perplexity привлёк более $250 миллионов инвестиций при оценке свыше $1 миллиарда, получив поддержку от Джеффа Безоса и фондов Кремниевой долины. Продукт напрямую бросает вызов Google, показывая, что поиск информации можно радикально переосмыслить с помощью ИИ. Srinivas продвигает концепцию «answer engine» — поискового движка, который не просто находит, а понимает и синтезирует информацию. TIME отмечает: его стартап вызвал споры из-за обвинений в копировании контента СМИ, но продолжает стремительно расти."},
      {n:"Brett Adcock", r:"CEO и основатель, Figure", b:"Brett Adcock — серийный предприниматель, ранее основавший Archer Aviation (аэротакси). В 2022 году создал Figure AI для разработки человекоподобных роботов, управляемых ИИ. Компания привлекла более $700 миллионов инвестиций от Microsoft, NVIDIA, OpenAI и Джеффа Безоса при оценке $2,6 миллиарда. Figure заключила партнёрство с BMW для тестирования роботов на автомобильных заводах и с OpenAI для интеграции языковых моделей в управление роботами. Его робот Figure 01 продемонстрировал способность вести диалог и выполнять физические задачи одновременно. TIME включил Adcock как пример того, как ИИ выходит «из лаборатории в реальный мир»."},
      {n:"Chris Olah", r:"Сооснователь, Anthropic", b:"Chris Olah — один из мировых пионеров исследования интерпретируемости нейронных сетей, области, изучающей, как именно AI-модели «думают» и принимают решения. Его работы в Google Brain и Anthropic по визуализации внутренних представлений нейросетей стали каноническими в поле AI-безопасности. В Anthropic возглавляет исследования «механистической интерпретируемости», пытаясь буквально заглянуть внутрь больших языковых моделей. Эта работа критически важна: если мы не понимаем, как работает AI-модель, мы не можем гарантировать её безопасность. Olah известен своими визуально богатыми научными публикациями на distill.pub, задавшими новый стандарт оформления AI-исследований. TIME подчёркивает растущую важность безопасности и прозрачности ИИ через его работу."},
      {n:"Daphne Koller", r:"CEO, Insitro", b:"Daphne Koller — стэнфордский профессор, лауреат стипендии Макартура («грант гениев») и сооснователь Coursera, платформы, перевернувшей онлайн-образование. Основала Insitro в 2018 году, применяя машинное обучение для революции в разработке лекарств. Компания использует генеративный ИИ для моделирования биологических процессов, ускоряя открытие новых препаратов с годов до месяцев. Insitro привлекла более $600 миллионов инвестиций от a16z, Canada Pension Plan и других крупных фондов. Koller — одна из немногих людей, совершивших прорыв сразу в двух областях: образовании и биотехнологиях. TIME включил её как пример того, как ИИ может спасать жизни, а не только генерировать текст."},
      {n:"Jonathan Ross", r:"CEO, Groq", b:"Jonathan Ross — бывший инженер Google, участвовавший в создании TPU, первого специализированного AI-чипа компании. Основал Groq, создав инновационные чипы Language Processing Unit (LPU) для сверхбыстрого AI-инференса. Системы Groq демонстрируют рекордную скорость генерации текста — в разы быстрее конкурентов, бросая вызов NVIDIA. Компания привлекла более $300 миллионов и активно масштабирует облачную инфраструктуру для предоставления самого быстрого API для языковых моделей. Подход Ross — специализированные чипы вместо универсальных GPU — может изменить экономику AI-инференса. TIME отмечает: его технология особенно важна для приложений, требующих мгновенного отклика."},
      {n:"Andrew Feldman", r:"CEO и сооснователь, Cerebras Systems", b:"Andrew Feldman создал крупнейший в мире AI-чип — Wafer Scale Engine размером с целую кремниевую пластину. Чип Cerebras содержит 4 триллиона транзисторов и предлагает альтернативный подход к обучению больших моделей: один гигантский чип вместо кластеров тысяч GPU. Компания привлекла более $700 миллионов инвестиций и работает с национальными лабораториями США, Министерством обороны и крупнейшими фармкомпаниями. Feldman бросает вызов доминированию NVIDIA, предлагая принципиально иную архитектуру вычислений. Его системы демонстрируют впечатляющие результаты в обучении моделей и научных вычислениях. Cerebras готовится к IPO, что может стать одним из крупнейших технологических размещений года, и TIME отметил его как ключевого инноватора в чиповой индустрии."},
      {n:"Albert Gu", r:"Исследователь, Carnegie Mellon University", b:"Albert Gu — автор архитектуры Mamba, революционной альтернативы трансформерам, основанной на моделях пространства состояний (SSM). Его работа открывает путь к языковым моделям, которые обрабатывают длинные последовательности гораздо эффективнее классических трансформеров. Mamba привлекла огромное внимание AI-сообщества: модель достигает качества трансформеров при значительно меньших вычислительных затратах. Gu — один из немногих исследователей, предложивших реальную архитектурную альтернативу доминирующей парадигме «Attention Is All You Need». Его работы потенциально могут изменить всю экономику обучения и инференса языковых моделей. TIME включил его как мыслителя, бросающего вызов фундаментальным допущениям AI-индустрии."},
      {n:"Noam Shazeer", r:"Сооснователь Character.AI / Google DeepMind", b:"Noam Shazeer — один из авторов легендарной статьи «Attention Is All You Need» (2017), представившей архитектуру трансформеров, фундамент всех современных LLM от GPT до Claude. Покинул Google и основал Character.AI — платформу для общения с AI-персонажами, привлёкшую миллионы пользователей. В 2024 году вернулся в Google DeepMind в рамках сделки стоимостью $2,7 миллиарда — одного из самых дорогих «aqui-hire» в истории AI. Shazeer обладает уникальной экспертизой: его работы буквально создали технологическую основу AI-революции. Возвращение в Google усилило позиции DeepMind в гонке за следующее поколение моделей. TIME отмечает его карьерный путь — от исследовательской статьи до бизнеса за миллиарды — как воплощение траектории всей AI-индустрии."},
      {n:"Victor Riparbelli", r:"CEO и сооснователь, Synthesia", b:"Victor Riparbelli основал Synthesia в Лондоне, платформу для генерации реалистичных AI-видео с виртуальными аватарами, говорящими на десятках языков. К 2024 году компания достигла оценки в $2,1 миллиарда, а её продуктом пользуются более 50 000 компаний, включая Amazon, BBC и Reuters. Synthesia позволяет создавать профессиональные видеоролики без камер, студий и актёров, радикально снижая стоимость и время производства. Riparbelli активно участвует в дискуссиях об этике синтетических медиа и дипфейков. Его компания — лидер рынка генеративного AI-видео в корпоративном сегменте. TIME подчёркивает выход генеративного ИИ за пределы текста — в мультимодальное пространство — через его работу."},
      {n:"Vinod Khosla", r:"Основатель, Khosla Ventures", b:"Vinod Khosla — легендарный венчурный инвестор и сооснователь Sun Microsystems, один из самых ранних и крупных инвесторов в OpenAI, вложившийся ещё в некоммерческую фазу компании. Его фонд Khosla Ventures поддерживает десятки AI-стартапов — от здравоохранения до климатических технологий. Khosla открыто продвигает радикальные прогнозы: считает, что ИИ заменит 80% работы врачей и юристов в ближайшие десятилетия. Его инвестиционная стратегия сосредоточена на «технологиях, которые меняют мир», и ИИ занимает в ней центральное место. Активно участвует в публичных дебатах о влиянии ИИ на рынок труда и общество. TIME включил его как одного из тех, кто формирует направление венчурного капитала в AI-индустрии."},
      {n:"Silvio Savarese", r:"Главный учёный, Salesforce", b:"Silvio Savarese руководит разработкой Einstein GPT и переводом Salesforce — крупнейшей CRM-платформы мира — в эру агентного ИИ. Под его руководством Salesforce создаёт AI-агентов, способных автономно обрабатывать клиентские запросы, генерировать маркетинговые тексты и автоматизировать продажи. Разработал AI-бенчмарк для CRM-систем, помогающий бизнесам выбирать оптимальные языковые модели. Savarese продвигает концепцию компактных, специализированных моделей с меньшим углеродным следом как альтернативу гигантским LLM. До Salesforce был профессором компьютерного зрения в Стэнфорде. TIME отметил его за то, как генеративный ИИ трансформирует корпоративный софт через его работу."},
      {n:"Katja Grace", r:"Сооснователь, AI Impacts", b:"Katja Grace основала AI Impacts — исследовательскую организацию, специализирующуюся на прогнозировании развития ИИ и анализе долгосрочных рисков. Её масштабный опрос AI-исследователей о сроках появления AGI стал одним из самых цитируемых источников в дебатах о будущем ИИ. Grace исследует экономические и социальные последствия автоматизации, а её количественный подход к оценке AI-прогресса признан одним из самых строгих в поле. Работы AI Impacts используются регуляторами, политиками и AI-компаниями для принятия стратегических решений. TIME отметил её как часть узкого круга исследователей, чьё мнение напрямую влияет на AI-политику."},
      {n:"Zack Dvey-Aharon", r:"CEO и сооснователь, AEYE Health", b:"Zack Dvey-Aharon — международно признанный AI-эксперт, создавший AEYE-DS, первую полностью автономную AI-систему для диагностики диабетической ретинопатии, одобренную FDA. Система уникальна тем, что работает с портативными камерами и не требует врачебной интерпретации, делая скрининг доступным в любых условиях. AEYE Health расширяет линейку, разрабатывая AI-диагностику для сердечно-сосудистых заболеваний, глаукомы и макулярной дегенерации. В интервью TIME Dvey-Aharon рассказал о возможности диагностировать широкий спектр заболеваний через AI-анализ сетчатки глаза. Его работа — яркий пример реального применения ИИ для спасения зрения миллионов людей. TIME назвал его в числе инноваторов, показывающих потенциал ИИ для улучшения жизни."},
      {n:"Steve Huffman", r:"CEO, Reddit", b:"Steve Huffman — сооснователь и CEO Reddit, одного из крупнейших интернет-форумов мира с сотнями миллионов пользователей. В 2024 году заключил многомиллионные сделки с Google и OpenAI на лицензирование данных Reddit для обучения AI-моделей. Это решение вызвало протесты сообщества, но сделало Reddit одним из ключевых поставщиков обучающих данных для LLM. Huffman аргументирует, что если AI-компании зарабатывают на контенте Reddit, платформа заслуживает компенсации. Успешный IPO Reddit в 2024 году частично основывался на ценности его данных для AI-индустрии. TIME отмечает: его решения влияют на фундаментальный вопрос — кому принадлежит интернет-контент в эпоху ИИ."},
    ]
  },
  {
    id:"shapers", label:"СОЗДАТЕЛИ ПОВЕСТКИ", color:"#4A90D9", cl:"#6BAAE8", glow:"rgba(74,144,217,0.4)",
    desc:"Политики, регуляторы, активисты, медийные фигуры. Они определяют правила: кто получит AI-чипы, как защитить права личности и какие законы будут управлять ИИ.",
    people:[
      {n:"Gina Raimondo", r:"Министр торговли США", b:"Gina Raimondo — министр торговли США и ключевой архитектор экспортного контроля на передовые AI-чипы, ограничившего доступ Китая и других стран к критическим технологиям NVIDIA и AMD. Её политика определяет глобальный баланс сил в AI-индустрии — кто получает доступ к передовым вычислениям, а кто нет. Под её руководством было создано US AI Safety Institute для тестирования и оценки AI-систем. Raimondo ведёт переговоры с AI-компаниями о добровольных обязательствах по безопасности и координирует международное сотрудничество по AI-регулированию. Её решения напрямую влияют на стратегии NVIDIA, AMD и десятков AI-стартапов. TIME отмечает её как одну из самых влиятельных фигур на пересечении AI-политики и геополитики."},
      {n:"Thierry Breton", r:"Еврокомиссар по внутреннему рынку", b:"Thierry Breton — главный автор и лоббист EU AI Act, первого в мире комплексного закона о регулировании искусственного интеллекта, вступившего в силу в 2024 году. Закон вводит классификацию AI-систем по уровню риска и устанавливает жёсткие требования к высокорисковым приложениям. Breton последовательно давил на BigTech, требуя соблюдения европейских правил и угрожая многомиллиардными штрафами. Его подход вызывает критику со стороны Кремниевой долины: многие считают, что чрезмерное регулирование задушит европейские AI-инновации. Однако EU AI Act стал образцом для десятков стран, разрабатывающих собственное AI-законодательство. TIME включил его как мирового лидера AI-регулирования."},
      {n:"Scarlett Johansson", r:"Актриса и активист", b:"Scarlett Johansson — одна из самых высокооплачиваемых актрис Голливуда, ставшая неожиданным, но ярким голосом в AI-дебатах. В мае 2024 года публично обвинила OpenAI в создании голосового AI-ассистента Sky, звучавшего подозрительно похоже на её голос — после того как она дважды отказалась от предложения озвучить ассистента. Её заявление вынудило OpenAI убрать голос Sky и привлекло глобальное внимание к вопросам согласия и авторских прав в AI-эпоху. Johansson ранее озвучила ИИ-персонажа в фильме «Она» (2013), что делает ситуацию особенно ироничной. Её позиция стала символом борьбы за права личности против корпоративного использования образов без разрешения. TIME поместил её на обложку TIME100 AI 2024."},
      {n:"Francesca Mani", r:"Активист, 15 лет", b:"Francesca Mani — самый молодой участник списка TIME100 AI 2024. Стала жертвой AI-дипфейков в своей школе и превратила личный опыт в национальную кампанию по защите несовершеннолетних. Активно лоббирует законодательные изменения в Конгрессе и легислатурах штатов для криминализации создания дипфейков с участием несовершеннолетних. Её история привлекла внимание СМИ и политиков, ускорив принятие законов о защите от AI-злоупотреблений в нескольких штатах. В свои 15 лет выступает перед законодателями и на конференциях, представляя голос подростков в AI-дебатах. TIME назвал её примером того, что даже самые молодые голоса могут влиять на технологическую политику."},
      {n:"Anil Kapoor", r:"Актёр, Болливуд", b:"Anil Kapoor — легенда Болливуда и международная кинозвезда, известный по фильму «Миллионер из трущоб». В 2023 году одержал знаковую правовую победу в Высоком суде Нью-Дели, защитив свой образ от несанкционированного использования с помощью ИИ для создания дипфейков. Суд запретил использование его имени, голоса, внешности и других атрибутов личности без согласия, создав прецедент для защиты «личностных прав» в AI-эпоху. Эта победа открыла путь другим публичным фигурам для правовой защиты от AI-злоупотреблений. Kapoor стал символом борьбы за цифровые права личности в Индии и во всём мире. TIME отметил его «знаковую победу», влияющую на глобальную дискуссию о регулировании дипфейков."},
      {n:"Marques Brownlee", r:"MKBHD, YouTube-блогер", b:"Marques Brownlee — крупнейший технологический YouTube-блогер с более чем 19 миллионами подписчиков, создающий детальные обзоры AI-продуктов и технологий. Его видео о ChatGPT, AI-камерах, генеративных инструментах и роботах формируют мнение миллионов людей о технологиях ИИ. Brownlee интервьюировал Марка Цукерберга, Илона Маска, Сэма Альтмана и других лидеров AI-индустрии. Его уникальная роль — перевод сложных технологических концепций на язык, понятный массовой аудитории. В 2024 году запустил собственное приложение Panels, применяя предпринимательские навыки за пределами YouTube. TIME поместил его на обложку TIME100 AI, отражая признание влияния технологических медиа на общественное восприятие ИИ."},
      {n:"Scott Wiener", r:"Сенатор штата Калифорния", b:"Scott Wiener — автор законопроекта SB 1047 о безопасности ИИ, самого обсуждаемого AI-закона 2024 года, вызвавшего раскол в Кремниевой долине. Законопроект требовал от разработчиков крупных AI-моделей проводить тестирование безопасности и нести ответственность за катастрофические последствия. Против выступили OpenAI, Google и ряд стартапов, назвав его чрезмерно жёстким; за — Anthropic и многие AI-исследователи. Губернатор Калифорнии Гэвин Ньюсом в итоге наложил вето на законопроект, но дебаты, которые он вызвал, сформировали глобальную повестку AI-регулирования. Wiener продолжает продвигать новые версии AI-законодательства в штате, где расположено большинство ведущих AI-компаний. TIME отметил его инициативы как лакмусовую бумажку для отношения к AI-регулированию."},
      {n:"Elizabeth Kelly", r:"Директор, US AI Safety Institute", b:"Elizabeth Kelly возглавляет новый институт безопасности ИИ при NIST, первую федеральную структуру США, посвящённую тестированию и оценке AI-систем. Институт разрабатывает стандарты и методы проверки моделей на опасные способности до их выпуска на рынок. Kelly работает напрямую с OpenAI, Anthropic, Google и другими компаниями, заключая соглашения о предрелизном тестировании. Её институт стал ключевым элементом реализации исполнительного указа Байдена об ИИ. Ранее работала в финансовом регулировании, привнося опыт управления системными рисками. TIME включил её как одну из определяющих, какие AI-модели считаются «достаточно безопасными» для широкого применения."},
      {n:"Amandeep Singh Gill", r:"Спецпосланник ООН по технологиям", b:"Amandeep Singh Gill назначен Генеральным секретарём ООН для координации глобальных усилий по управлению AI-рисками и обеспечению справедливого доступа к технологиям. Возглавил подготовку «Глобального цифрового договора» — попытки ООН создать международные рамки для управления ИИ. Gill работает над тем, чтобы голоса развивающихся стран были услышаны в AI-дискуссии, а не только перспектива Кремниевой долины и Пекина. TIME провёл с ним развёрнутое интервью о будущем международного AI-регулирования. Ранее был индийским дипломатом, специализирующимся на кибербезопасности и разоружении. Его роль критически важна в эпоху, когда ИИ становится предметом геополитической конкуренции."},
      {n:"Ashwini Vaishnaw", r:"Министр IT и телекоммуникаций Индии", b:"Ashwini Vaishnaw формирует AI-политику Индии — страны с 1,4 миллиарда населения, амбициозно претендующей на роль глобального AI-лидера. Под его руководством Индия разработала стратегию развития ИИ, включающую инвестиции в вычислительную инфраструктуру и создание национальных AI-датасетов. Vaishnaw балансирует между привлечением глобальных AI-компаний и защитой интересов индийских разработчиков и пользователей. Индия рассматривает ИИ как инструмент решения масштабных социальных задач — от здравоохранения до сельского хозяйства. Его политика сочетает поддержку инноваций с осторожным подходом к регулированию, отличающимся от жёсткой европейской модели. TIME включил его, отражая растущую роль Глобального Юга в AI-экосистеме."},
      {n:"Nandan Nilekani", r:"Сооснователь, Infosys", b:"Nandan Nilekani — легенда индийского IT-сектора, сооснователь Infosys, одной из крупнейших IT-компаний мира с капитализацией более $80 миллиардов. Создатель Aadhaar — крупнейшей в мире системы цифровой идентификации, охватывающей 1,3 миллиарда индийцев. Теперь продвигает применение ИИ для общественного блага в Индии: цифровые платежи, здравоохранение, образование. Nilekani выступает за создание «цифровой общественной инфраструктуры» (DPI), которая может служить фундаментом для AI-приложений в развивающихся странах. Его видение — ИИ не как роскошь для богатых стран, а как инструмент развития для миллиардов. TIME отмечает его растущее влияние на глобальную AI-повестку."},
      {n:"Andrew Yao", r:"Профессор, Университет Цинхуа", b:"Andrew Yao — один из самых выдающихся компьютерных учёных мира и единственный китайский лауреат премии Тьюринга, высшей награды в информатике. В 2023 году призвал к созданию международного регуляторного органа для ИИ, что стало заметным заявлением для китайского учёного такого уровня. В возрасте 77 лет продолжает активно участвовать в формировании AI-политики Китая и международной AI-дискуссии. Yao основал Институт междисциплинарных информационных наук в Цинхуа, подготовивший многих ведущих китайских AI-исследователей. Его голос имеет огромный вес как в академии, так и в правительственных кругах КНР. TIME включил его как самого старшего участника списка TIME100 AI 2024."},
      {n:"Dwarkesh Patel", r:"Подкастер", b:"Dwarkesh Patel — 23-летний создатель Dwarkesh Podcast, одного из самых глубоких и технически грамотных подкастов об ИИ. За четыре года взял интервью у Марка Цукерберга, Джеффа Безоса и десятков ведущих AI-исследователей, став обязательным прослушиванием для AI-сообщества. Patel выделяется исключительной подготовкой к интервью: каждый эпизод — результат десятков часов исследования. Его подкаст получил похвалу от самих участников списка TIME100 AI, включая Цукерберга и Безоса. Несмотря на молодой возраст, Patel влияет на то, как AI-сообщество осмысливает будущее технологии. TIME назвал его одним из самых важных голосов в AI-медиапространстве."},
      {n:"Becky Pringle", r:"Президент, NEA", b:"Becky Pringle — глава National Education Association, крупнейшего профсоюза США с 3 миллионами членов, в основном учителей. Активно выступает за этичное и справедливое внедрение ИИ в американских школах, предупреждая о рисках замены учителей алгоритмами. Pringle продвигает видение, в котором ИИ помогает педагогам, а не вытесняет их, и настаивает на участии учителей в принятии решений о внедрении AI-технологий. NEA под её руководством разработала рекомендации по использованию генеративного ИИ в образовании. Её голос влияет на то, как миллионы американских школьников будут взаимодействовать с AI-инструментами. TIME включил её как представителя интересов работников на фронте AI-автоматизации."},
      {n:"Mophat Okinyi", r:"Исследователь, Кения", b:"Mophat Okinyi — кенийский исследователь, привлёкший глобальное внимание к условиям труда AI-аннотаторов в Африке, людей, которые модерируют контент и размечают данные для обучения AI-моделей. Его работа раскрыла, что многие AI-работники в Кении получают менее $2 в час за психологически травмирующую работу по фильтрации насильственного и сексуального контента. Okinyi стал голосом «невидимых работников ИИ» — людей, чей труд стоит за фасадом блестящих AI-продуктов. Его исследования повлияли на дискуссию о справедливости в AI-индустрии и привлекли внимание к неравенству между создателями и «обслуживающим персоналом» ИИ. Работает с международными организациями по улучшению условий труда AI-аннотаторов. TIME подчеркнул через него, что за каждой AI-моделью стоит человеческий труд."},
      {n:"Meredith Stiehm", r:"Сценарист и продюсер", b:"Meredith Stiehm — известная голливудская сценаристка («Родина», «Хорошая жена»), активно защищающая права творческих работников в контексте AI-угроз. Участвовала в исторической забастовке сценаристов WGA 2023 года, одним из ключевых требований которой было ограничение использования ИИ в написании сценариев. Забастовка длилась 148 дней и завершилась соглашением, включающим беспрецедентные ограничения на использование AI в Голливуде. Stiehm продолжает выступать за то, чтобы ИИ был инструментом в руках авторов, а не их заменой. Её позиция влияет на дискуссию о будущем творческих профессий в AI-эпоху во всём мире. TIME включил её как голос творческой индустрии в технологической дискуссии."},
      {n:"Chinasa T. Okolo", r:"Brookings Institution", b:"Chinasa T. Okolo — исследователь влияния ИИ на Глобальный Юг (Африку, Южную Азию и Латинскую Америку) и одна из ведущих экспертов по AI-этике в развивающихся странах. Её работы в Brookings Institution анализируют, как AI-системы, разработанные в богатых странах, влияют на жизнь миллиардов людей в бедных регионах. Okolo исследует предвзятость AI-моделей в отношении языков, культур и проблем Глобального Юга. Выступала на конференции TIME100 Impact Dinner, представляя перспективу развивающихся стран в AI-дискуссии. Её позиция — что AI-развитие не должно усугублять глобальное неравенство — влияет на международную AI-политику. TIME включил её как критически важный голос в дискуссии, где доминируют Кремниевая долина и Пекин."},
      {n:"King Willonius", r:"Комик и AI-рассказчик", b:"King Willonius (настоящее имя Hatcher) летом 2023 года стал вирусной сенсацией с «BBL Drizzy», AI-генерированной комедийной песней, высмеивавшей рэпера Drake во время его конфликта с Кендриком Ламаром. Видео собрало миллионы просмотров и показало творческий потенциал генеративного ИИ в развлечениях. Hatcher использует AI-инструменты для создания комедийного контента, исследуя границы между человеческим творчеством и машинной генерацией. Его работа поднимает фундаментальные вопросы: где заканчивается авторство человека и начинается вклад ИИ? TIME включил его как представителя креативного сообщества, экспериментирующего с AI-технологиями. Его пример показывает, что ИИ трансформирует не только бизнес и науку, но и культуру."},
    ]

  {
    id:"thinkers", label:"МЫСЛИТЕЛИ", color:"#2ECC71", cl:"#58D68D", glow:"rgba(46,204,113,0.4)",
    desc:"Нобелевские лауреаты, «крёстные отцы» глубокого обучения, философы AI-безопасности. Их идеи определяют, куда движется технология и всё человечество.",
    people:[
      {n:"Geoffrey Hinton", r:"Профессор, Университет Торонто", b:"Geoffrey Hinton — «крёстный отец» глубокого обучения, чьи работы 1980-2000-х годов о нейросетях заложили фундамент всей современной AI-революции. В 2024 году получил Нобелевскую премию по физике за вклад в развитие нейросетевых исследований — беспрецедентное признание AI-учёного. В 2023 году покинул Google после десяти лет работы, чтобы свободно предупреждать об экзистенциальных рисках ИИ, который он сам помогал создать. Его публичные предостережения о том, что AI может стать «умнее человека» и выйти из-под контроля, получили огромный резонанс. Hinton выражает «сожаление о деле всей жизни», сравнивая свою ситуацию с Оппенгеймером и атомной бомбой. TIME отметил его эволюцию от AI-пионера к AI-алармисту как одну из самых значимых историй в технологической индустрии."},
      {n:"Yoshua Bengio", r:"Профессор, Университет Монреаля", b:"Yoshua Bengio — один из трёх «отцов глубокого обучения» (вместе с Хинтоном и Лекуном), лауреат премии Тьюринга 2018 года, высшей награды в информатике. Его исследования в области нейронных сетей, рекуррентных архитектур и генеративных моделей заложили фундамент современной AI-революции. В последние годы стал одним из самых громких голосов, предупреждающих об экзистенциальных рисках ИИ и призывающих к жёсткому регулированию. Bengio подписал множество открытых писем о необходимости паузы в AI-разработках и выступает перед правительствами и международными организациями. Основал и возглавляет Mila — крупнейший в мире академический исследовательский институт глубокого обучения. TIME включил его, отражая растущую тревогу внутри самого AI-сообщества."},
      {n:"Yann LeCun", r:"Chief AI Scientist, Meta", b:"Yann LeCun — третий из «отцов глубокого обучения» и лауреат премии Тьюринга, изобретатель свёрточных нейронных сетей, фундамента компьютерного зрения. С 2013 года возглавляет фундаментальные AI-исследования в Meta, руководя FAIR — одной из самых уважаемых AI-лабораторий мира. LeCun — один из самых активных и контроверсных голосов в AI-дебатах: он открыто критикует «AI-алармистов» и выступает за открытые модели. Его позиция прямо противоположна Хинтону и Бенджио — он считает опасения о сверхинтеллекте преждевременными. Под его научным руководством Meta выпустила серию открытых моделей LLaMA. TIME включил его, отметив его публичные дебаты с другими лауреатами Тьюринга о рисках ИИ как одни из самых обсуждаемых в индустрии."},
      {n:"Fei-Fei Li", r:"Профессор, Стэнфордский университет", b:"Fei-Fei Li — создательница ImageNet, набора данных из миллионов размеченных изображений, запустившего революцию глубокого обучения в компьютерном зрении и всю современную AI-эру. Основала Stanford Institute for Human-Centered Artificial Intelligence (HAI), продвигая человекоцентричный подход к развитию ИИ. Автор мемуаров «The Worlds I See», связывающих её личную историю иммигрантки из Китая с историей AI-исследований. Под её руководством HAI стал одним из главных центров AI-политики и этики в мире. Li активно консультирует правительство США и международные организации по AI-вопросам. TIME отмечает её путь от выпускницы Принстона до одного из самых влиятельных AI-учёных как вдохновение для новых поколений исследователей."},
      {n:"Ray Kurzweil", r:"Футуролог, инженер Google", b:"Ray Kurzweil — легендарный изобретатель, футуролог и директор инженерного отдела Google, автор концепции «технологической сингулярности». Предсказал многие AI-прорывы за десятилетия до их появления, включая победу компьютера в шахматы и взрывной рост нейросетей. В 2024 году выпустил новую книгу «The Singularity Is Nearer», обновив свои прогнозы о достижении AGI к 2029 году. Kurzweil изобрёл первый CCD-сканер, синтезатор речи для слепых и музыкальные синтезаторы, получив Национальную медаль технологий от президента США. Его прогнозы вызывают как восхищение, так и скептицизм, но точность многих из них остаётся впечатляющей. TIME провёл с ним развёрнутое интервью для выпуска TIME100 AI 2024."},
      {n:"Meredith Whittaker", r:"Президент, Signal", b:"Meredith Whittaker — бывшая сотрудница Google, организовавшая масштабный протест 20 000 работников компании против её AI-контрактов с Пентагоном. Возглавляет мессенджер Signal, главный продукт в мире защищённых коммуникаций, и одна из самых влиятельных критиков AI-индустрии. Whittaker предупреждает об опасности концентрации AI-власти в руках нескольких корпораций и о «надзорном капитализме». Сооснователь AI Now Institute — ведущего исследовательского центра по социальным последствиям ИИ. Её критика особенно весома, потому что основана на личном опыте работы внутри Google. TIME намеренно поставил её в диалог с Sundar Pichai на обложке: один хвалит AI-продукты, другая выражает тревогу."},
      {n:"Amba Kak", r:"Со-директор, AI Now Institute", b:"Amba Kak возглавляет AI Now Institute, один из самых авторитетных исследовательских центров, изучающих социальные, экономические и политические последствия ИИ. Ранее была старшим советником в Федеральной торговой комиссии США, где формировала AI-политику на государственном уровне. Kak исследует вопросы корпоративной власти, подотчётности AI-систем и влияния технологий на маргинализированные сообщества. Её работы используются регуляторами по всему миру для обоснования AI-политики. Выступала на конференции TIME100 Impact Dinner, представляя критическую перспективу на AI-индустрию. TIME поместил её на обложку TIME100 AI, подчёркивая, что критики технологий так же важны, как и их создатели."},
      {n:"Helen Toner", r:"Бывший член совета директоров OpenAI", b:"Helen Toner стала одной из ключевых фигур в самой драматичной корпоративной истории 2023 года — увольнении и возвращении Сэма Альтмана в OpenAI. Как член совета директоров, голосовала за увольнение Альтмана, что спровоцировало кризис, угрожавший существованию компании. После его возвращения покинула совет, но продолжила публично говорить о проблемах корпоративного управления в AI-компаниях. Toner ранее была директором по стратегии в Centre for the Governance of AI при Оксфорде и работала в Georgetown's Center for Security and Emerging Technology. Её история стала символом фундаментального конфликта между безопасностью ИИ и коммерческими интересами. TIME включил её как ключевого мыслителя, поднимающего вопрос: кто контролирует самые мощные AI-компании?"},
      {n:"Cari Tuna", r:"Президент, Open Philanthropy", b:"Cari Tuna через Open Philanthropy направила более $400 миллионов на исследования безопасности ИИ с 2015 года, сделав фонд одним из крупнейших филантропических спонсоров AI-безопасности в мире. Open Philanthropy финансирует десятки организаций — от академических исследовательских групп до стартапов, работающих над оценкой и снижением AI-рисков. Tuna — жена сооснователя Facebook Дастина Московица, и вместе они направляют миллиарды на «эффективный альтруизм», включая AI-безопасность. Её инвестиционные решения буквально определяют, какие исследования безопасности ИИ получают финансирование, а какие нет. Open Philanthropy также финансировала Anthropic, MIRI, Redwood Research и другие ключевые AI-организации. TIME отмечает её роль как пример того, как филантропия может влиять на направление развития целой технологической отрасли."},
      {n:"Beth Barnes", r:"Основатель и глава исследований, METR", b:"Beth Barnes создала METR (Model Evaluation and Threat Research), организацию, оценивающую потенциально опасные способности AI-моделей до их выпуска на рынок. METR проводит независимую экспертизу моделей для OpenAI, Anthropic и других компаний, проверяя их на способность к автономным действиям, самовоспроизведению и обходу ограничений. Работа Barnes критически важна: она буквально решает, какие AI-модели считаются «достаточно безопасными» для публичного доступа. Ранее работала в Alignment Research Center, одной из первых организаций по AI-безопасности. Её методы тестирования стали отраслевым стандартом и используются регуляторами. TIME включил её как ключевую фигуру в экосистеме AI-безопасности."},
      {n:"Sara Hooker", r:"Глава, Cohere for AI", b:"Sara Hooker руководит исследовательским подразделением Cohere, работающим над доступным, справедливым и многоязычным ИИ. Под её руководством Cohere for AI выпустила Aya, масштабный открытый проект по созданию AI-моделей для 101 языка, включая малоресурсные. Hooker ранее работала в Google Brain, где исследовала, что теряется при сжатии AI-моделей и как это непропорционально влияет на качество для меньшинств. Её работы о «компрессионной предвзятости» стали влиятельными в дискуссии о справедливости ИИ. Активно продвигает идею, что AI не должен быть технологией только для англоязычного мира. TIME поместил её на обложку TIME100 AI, подчёркивая важность многоязычности и инклюзивности."},
      {n:"Sasha Luccioni", r:"AI Climate Lead, Hugging Face", b:"Sasha Luccioni — ведущий мировой голос в области экологического воздействия ИИ, работающая в Hugging Face над измерением и сокращением углеродного следа AI-моделей. Создала инструменты для оценки энергопотребления AI-систем и первой предложила систему маркировки AI-моделей по аналогии с энергоэтикетками бытовой техники. Её исследования показали, что обучение одной крупной модели может выбрасывать столько же CO2, сколько несколько трансатлантических перелётов. Luccioni выступает на международных форумах, включая COP и Dreamforce, привлекая внимание к «невидимой» экологической цене AI-бума. Её работа особенно актуальна на фоне строительства гигантских AI-дата-центров по всему миру. TIME включил её как голос устойчивого развития в AI-индустрии."},
      {n:"Daniela Amodei", r:"Президент и сооснователь, Anthropic", b:"Daniela Amodei вместе с братом Дарио основала Anthropic в 2021 году, покинув OpenAI из-за разногласий по вопросам безопасности. Управляет бизнес-стороной компании, привлекая миллиарды инвестиций от Google ($2 миллиарда) и Amazon ($4 миллиарда). Под её руководством Anthropic выросла из стартапа в одного из главных конкурентов OpenAI, достигнув оценки в $18 миллиардов. Amodei продвигает модель «ответственной коммерциализации» ИИ — идею о том, что компания может быть одновременно прибыльной и ориентированной на безопасность. Выступала на серии TIME100 Talks о строительстве справедливого AI-будущего. TIME отметил её роль как доказательство того, что руководство AI-компанией — это не только технология, но и бизнес-стратегия и ценности."},
      {n:"Mustafa Suleyman", r:"CEO, Microsoft AI", b:"Mustafa Suleyman — сооснователь DeepMind (одной из самых влиятельных AI-лабораторий мира), затем основал Inflection AI и создал Pi, персональный AI-ассистент. В 2024 году Microsoft приобрела ключевые активы Inflection, а Suleyman возглавил новое подразделение Microsoft AI. Автор книги «The Coming Wave», предупреждающей о рисках и обещаниях AI и биотехнологий. Его карьерный путь — от DeepMind через собственный стартап в Microsoft — отражает динамику консолидации AI-индустрии. Suleyman сочетает глубокое понимание AI-исследований с предпринимательским опытом и политическим влиянием. TIME включил его как одного из ключевых архитекторов AI-стратегии Microsoft наряду с партнёрством с OpenAI."},
      {n:"Stuart Russell", r:"Профессор, UC Berkeley", b:"Stuart Russell — автор «Artificial Intelligence: A Modern Approach», самого известного и используемого учебника по ИИ, на котором учились поколения AI-исследователей. Активно предупреждает о рисках создания сверхинтеллекта и продвигает концепцию AI-систем, совместимых с человеческими ценностями. Его книга «Human Compatible» предлагает фундаментально новый подход к созданию безопасного ИИ — системы, которые не знают своих целей и учатся им у людей. Russell — один из основателей Center for Human-Compatible AI в Беркли. Выступает перед ООН, правительствами и международными организациями по вопросам AI-безопасности. TIME включил его, отмечая, что его академический авторитет делает его одним из самых слышимых голосов в дискуссии о будущем ИИ."},
      {n:"Timnit Gebru", r:"Основатель, DAIR Institute", b:"Timnit Gebru — бывшая сотрудница Google, уволенная в 2020 году после публикации критической работы о рисках больших языковых моделей, статьи, ставшей одной из самых цитируемых в поле AI-этики. Увольнение вызвало скандал, протесты сотрудников Google и широкую дискуссию о свободе исследований в BigTech. Основала Distributed AI Research Institute (DAIR), фокусируясь на справедливости ИИ, особенно в отношении маргинализированных сообществ. Её работы об этнической предвзятости систем распознавания лиц изменили отношение индустрии к fairness в AI. Gebru стала символом борьбы за честность и открытость AI-исследований внутри крупных корпораций. TIME включил её, отмечая, что её влияние формирует корпоративную политику и общественные ожидания от AI."},
      {n:"Joy Buolamwini", r:"Основатель, Algorithmic Justice League", b:"Joy Buolamwini — «поэтесса кода», исследовательница из MIT, доказавшая систематическую расовую и гендерную предвзятость коммерческих систем распознавания лиц от Microsoft, IBM и Amazon. Её диссертация «Gender Shades» показала, что эти системы допускают в 10-100 раз больше ошибок для темнокожих женщин, чем для белых мужчин. Основала Algorithmic Justice League для борьбы с предвзятостью AI-систем. Её работа привела к тому, что Amazon, IBM и Microsoft ограничили продажу технологий распознавания лиц полиции. Buolamwini документирована в фильме «Coded Bias» и выступала перед Конгрессом США. TIME отметил её влияние, выходящее далеко за академию — оно меняет корпоративную практику и законодательство."},
      {n:"Jan Leike", r:"Исследователь, Anthropic", b:"Jan Leike — бывший глава команды Superalignment в OpenAI, созданной для решения «задачи века»: обеспечения безопасности сверхинтеллекта. В мае 2024 года покинул OpenAI вместе с Ильёй Суцкевером, публично заявив, что компания «отодвинула безопасность на второй план» ради продуктов и прибыли. Его уход стал одним из самых резонансных событий в AI-индустрии, подтвердив опасения критиков о приоритетах OpenAI. Leike ранее работал в DeepMind, где занимался исследованиями безопасного обучения с подкреплением. После ухода из OpenAI присоединился к Anthropic, усилив команду конкурента. TIME включил его историю как символ фундаментального конфликта AI-индустрии: коммерческое давление vs. безопасность."},

// HELPERS
// ═══════════════════════════════════════
function initials(name) {
  return name.split(" ").map(w => w[0]).join("").slice(0, 2);
}
function adjustGlow(rgba, opacity) {
  return rgba.replace(/[\d.]+\)$/, opacity + ")");
}

// ═══════════════════════════════════════
// THREE.JS CINEMATIC BG
// ═══════════════════════════════════════
function initBG() {
  if (typeof THREE === "undefined") return;
  const canvas = document.getElementById("bg-canvas");
  const W = window.innerWidth, H = window.innerHeight;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050507, 0.0008);
  const camera = new THREE.PerspectiveCamera(60, W/H, 1, 2000);
  camera.position.set(0, 80, 400);
  camera.lookAt(0, 50, 0);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x050507);

  // Columns
  const colGeo = new THREE.CylinderGeometry(1.5, 1.5, 500, 8);
  for (let i = 0; i < 50; i++) {
    const m = new THREE.MeshBasicMaterial({ color: 0xE3120B, transparent: true, opacity: 0.02 + Math.random()*0.06 });
    const col = new THREE.Mesh(colGeo, m);
    col.position.set((Math.random()-0.5)*800, 0, (Math.random()-0.5)*600 - 100);
    scene.add(col);
  }
  // Arch
  const arch = new THREE.Mesh(
    new THREE.TorusGeometry(120, 3, 16, 100, Math.PI),
    new THREE.MeshBasicMaterial({ color: 0xE3120B, transparent: true, opacity: 0.15 })
  );
  arch.position.set(0, 120, -200);
  scene.add(arch);
  const archGlow = new THREE.Mesh(
    new THREE.TorusGeometry(120, 12, 8, 80, Math.PI),
    new THREE.MeshBasicMaterial({ color: 0xE3120B, transparent: true, opacity: 0.04 })
  );
  archGlow.position.copy(arch.position);
  scene.add(archGlow);
  // Grid
  const grid = new THREE.GridHelper(1200, 60, 0x1a0505, 0x0a0505);
  grid.position.y = -5;
  grid.material.opacity = 0.15;
  grid.material.transparent = true;
  scene.add(grid);
  // Particles
  const pCount = 600;
  const pGeo = new THREE.BufferGeometry();
  const pPos = new Float32Array(pCount*3);
  for (let i = 0; i < pCount; i++) {
    pPos[i*3] = (Math.random()-0.5)*800;
    pPos[i*3+1] = Math.random()*400;
    pPos[i*3+2] = (Math.random()-0.5)*600;
  }
  pGeo.setAttribute("position", new THREE.BufferAttribute(pPos, 3));
  const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({
    color: 0xE3120B, size: 2.5, transparent: true, opacity: 0.4,
    blending: THREE.AdditiveBlending, sizeAttenuation: true,
  }));
  scene.add(particles);
  // Lights
  const redLight = new THREE.PointLight(0xE3120B, 1.2, 500);
  redLight.position.set(0, 130, -180);
  scene.add(redLight);
  scene.add(new THREE.AmbientLight(0x111111, 0.5));

  let t = 0;
  function animate() {
    t += 0.005;
    camera.position.x = Math.sin(t*0.15)*30;
    camera.position.y = 80 + Math.sin(t*0.2)*10;
    camera.lookAt(0, 50 + Math.sin(t*0.1)*5, -50);
    const pos = particles.geometry.attributes.position.array;
    for (let i = 0; i < pCount; i++) {
      pos[i*3+1] += Math.sin(t + i*0.1)*0.15;
      if (pos[i*3+1] > 400) pos[i*3+1] = 0;
    }
    particles.geometry.attributes.position.needsUpdate = true;
    particles.rotation.y = t*0.02;
    redLight.intensity = 1.0 + Math.sin(t*2)*0.3;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();

  window.addEventListener("resize", () => {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w/h; camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
}

// ═══════════════════════════════════════
// RENDER PLANETS
// ═══════════════════════════════════════
let activeCat = null;
let openCardId = null;

function renderPlanets() {
  const container = document.getElementById("planets");
  container.innerHTML = "";
  CATS.forEach((cat, i) => {
    const wrap = document.createElement("div");
    wrap.className = "planet-wrap";
    wrap.style.animation = `f${i} ${3.2 + i*0.4}s ease-in-out infinite`;
    wrap.style.animationDelay = `${i*0.55}s`;
    wrap.dataset.catId = cat.id;

    wrap.innerHTML = `
      <div class="planet" id="planet-${cat.id}">
        <div class="planet-ring1"></div>
        <div class="planet-ring2"></div>
        <div class="planet-glow"></div>
        <div class="planet-body">
          <div class="planet-spec1"></div>
          <div class="planet-spec2"></div>
          <div class="planet-shadow"></div>
        </div>
        <div class="planet-label">${cat.label}</div>
      </div>
    `;

    // Apply colors
    const planet = wrap.querySelector(".planet");
    const ring1 = wrap.querySelector(".planet-ring1");
    const ring2 = wrap.querySelector(".planet-ring2");
    const glow = wrap.querySelector(".planet-glow");
    const body = wrap.querySelector(".planet-body");
    const label = wrap.querySelector(".planet-label");

    function paint(active) {
      ring1.style.border = `1px solid ${cat.color}${active ? "44" : "14"}`;
      ring2.style.border = `1px solid ${cat.color}${active ? "22" : "08"}`;
      glow.style.background = `radial-gradient(circle, ${cat.glow}, transparent 70%)`;
      glow.style.opacity = active ? "1" : "0.25";
      body.style.background = `radial-gradient(ellipse at 30% 25%, ${cat.cl}45, ${cat.color}22 45%, ${cat.color}08 75%, rgba(0,0,0,0.6))`;
      body.style.boxShadow = `inset -8px -8px 28px rgba(0,0,0,0.7), inset 5px 5px 20px ${cat.color}30, 0 0 ${active ? 50 : 18}px ${cat.glow}`;
      label.style.color = cat.color;
      label.style.opacity = active ? "1" : "0.5";
      planet.classList.toggle("active", active);
    }
    paint(false);

    // Hover
    wrap.addEventListener("mouseenter", (e) => {
      paint(true);
      showTooltip(cat, wrap);
    });
    wrap.addEventListener("mouseleave", () => {
      if (activeCat !== cat.id) paint(false);
      hideTooltip();
    });

    // Click
    wrap.addEventListener("click", () => {
      if (activeCat === cat.id) {
        activeCat = null;
        paint(false);
      } else {
        // Reset previous
        if (activeCat) {
          const prev = document.querySelector(`[data-cat-id="${activeCat}"]`);
          if (prev) {
            prev.querySelector(".planet").classList.remove("active");
            const prevCat = CATS.find(c => c.id === activeCat);
            const pPlanet = prev.querySelector(".planet");
            const pR1 = prev.querySelector(".planet-ring1");
            const pR2 = prev.querySelector(".planet-ring2");
            const pGlow = prev.querySelector(".planet-glow");
            const pBody = prev.querySelector(".planet-body");
            const pLabel = prev.querySelector(".planet-label");
            pR1.style.border = `1px solid ${prevCat.color}14`;
            pR2.style.border = `1px solid ${prevCat.color}08`;
            pGlow.style.opacity = "0.25";
            pBody.style.boxShadow = `inset -8px -8px 28px rgba(0,0,0,0.7), inset 5px 5px 20px ${prevCat.color}30, 0 0 18px ${prevCat.glow}`;
            pLabel.style.opacity = "0.5";
          }
        }
        activeCat = cat.id;
        openCardId = null;
        paint(true);
      }
      renderCards();
      hideTooltip();
    });

    container.appendChild(wrap);
  });
}

// ═══════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════
let tooltipEl = null;
function showTooltip(cat, anchorEl) {
  hideTooltip();
  const rect = anchorEl.getBoundingClientRect();
  const t = document.createElement("div");
  t.className = "tooltip";
  t.style.left = (rect.left + rect.width/2) + "px";
  t.style.top = rect.top + "px";
  t.innerHTML = `
    <div class="tooltip-box" style="border:1px solid ${cat.color}44; box-shadow:0 6px 30px rgba(0,0,0,0.5), 0 0 16px ${cat.glow}">
      <div class="tooltip-head">
        <div class="tooltip-dot" style="background:${cat.color}; box-shadow:0 0 6px ${cat.glow}"></div>
        <span class="tooltip-label" style="color:${cat.color}">${cat.label}</span>
        <span class="tooltip-count">${cat.people.length} чел.</span>
      </div>
      <p class="tooltip-desc">${cat.desc}</p>
      <div class="tooltip-cta" style="border-top:1px solid ${cat.color}18; color:${cat.color}">НАЖМИТЕ, ЧТОБЫ ПОСМОТРЕТЬ →</div>
    </div>
    <div class="tooltip-arrow" style="border-top:7px solid ${cat.color}44"></div>
  `;
  document.body.appendChild(t);
  tooltipEl = t;
}
function hideTooltip() {
  if (tooltipEl) { tooltipEl.remove(); tooltipEl = null; }
}

// ═══════════════════════════════════════
// RENDER CARDS GRID
// ═══════════════════════════════════════
function renderCards() {
  const container = document.getElementById("cards-container");
  if (!activeCat) { container.innerHTML = ""; return; }
  const cat = CATS.find(c => c.id === activeCat);

  const cardsHTML = cat.people.map((p, i) => {
    const id = `${cat.id}-${i}`;
    const isOpen = openCardId === id;
    return `
      <div class="card ${isOpen ? "open" : ""}" data-card-id="${id}" style="--glow:${cat.glow}; ${isOpen ? `border-color:${cat.color}66;` : ""}">
        <div class="card-header">
          <div class="avatar" style="
            background:radial-gradient(ellipse at 30% 25%, ${cat.color}55, ${cat.color}22 50%, ${cat.color}08 80%, rgba(0,0,0,0.5));
            border:1.5px solid ${cat.color}66;
            box-shadow:inset -3px -3px 10px rgba(0,0,0,0.5), inset 2px 2px 8px ${cat.color}40, 0 0 12px ${cat.glow};">${initials(p.n)}</div>
          <div class="card-name-role">
            <div class="card-name">${p.n}</div>
            <div class="card-role">${p.r}</div>
          </div>
          <button class="card-chevron">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
        <div class="card-body">
          <div class="card-body-inner" style="border-top:1px solid ${cat.color}22">
            <p class="card-bio">${p.b}</p>
            <a href="${TIME_BASE + slug(p.n)}" target="_blank" rel="noopener noreferrer" class="card-link" style="color:${cat.color}">
              Читать на TIME.com <span class="card-link-arrow">→</span>
            </a>
          </div>
        </div>
      </div>
    `;
  }).join("");

  container.innerHTML = `
    <div class="cards-section">
      <div class="cat-header" style="border-bottom:1px solid ${cat.color}22">
        <div class="cat-header-dot" style="background:${cat.color}; box-shadow:0 0 10px ${cat.glow}"></div>
        <div class="cat-header-text">
          <div class="cat-header-label" style="color:${cat.color}">${cat.label}</div>
          <div class="cat-header-desc">${cat.desc}</div>
        </div>
        <div class="cat-header-count">${cat.people.length} ЧЕЛОВЕК</div>
      </div>
      <div class="cards-grid">${cardsHTML}</div>
    </div>
  `;

  // Wire up card clicks
  container.querySelectorAll(".card").forEach(card => {
    const id = card.dataset.cardId;
    const header = card.querySelector(".card-header");
    header.addEventListener("click", (e) => {
      // Don't toggle if user clicks the link
      if (e.target.closest(".card-link")) return;
      openCardId = openCardId === id ? null : id;
      renderCards();
      // Smooth scroll into view
      setTimeout(() => {
        if (openCardId === id) {
          const c = document.querySelector(`[data-card-id="${id}"]`);
          if (c) c.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
      }, 50);
    });
  });
}

// ═══════════════════════════════════════
window.addEventListener("scroll", () => {
  const hint = document.getElementById("scroll-hint");
  if (window.scrollY > 80) hint.classList.add("hidden");
  else hint.classList.remove("hidden");
});

window.addEventListener("DOMContentLoaded", () => {
  initBG();
  renderPlanets();
});
